name: Release

# Creates a git tag and a GitHub Release for the given version, with notes
# extracted from CHANGELOG.md. Runs in GitHub Actions, whose GITHUB_TOKEN has
# the permissions needed to publish tags and releases.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release (e.g. 2.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Tag and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate version is not already released
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::version '$VERSION' is not semver (X.Y.Z)"; exit 1
          fi
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "::error::tag $VERSION already exists"; exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          # Pull the section under "## [VERSION]" up to the next "## [".
          awk -v v="## [$VERSION]" '
            index($0, v)==1 {f=1; next}
            f && /^## \[/ {f=0}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release $VERSION" > RELEASE_NOTES.md
          fi
          echo "----- release notes -----"; cat RELEASE_NOTES.md

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          gh release create "$VERSION" \
            --target "${{ github.sha }}" \
            --title "$VERSION" \
            --notes-file RELEASE_NOTES.md
