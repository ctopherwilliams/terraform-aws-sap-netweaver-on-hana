# See https://pre-commit.com for more information.
# Install hooks locally with:  pre-commit install
# Run against all files with:  pre-commit run --all-files
repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
        args:
          - --args=--recursive
          - --args=--minimum-failure-severity=error
      # Uses the shared .terraform-docs.yml config (output file/mode defined there).
      - id: terraform_docs

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: mixed-line-ending
        args: ["--fix=lf"]
